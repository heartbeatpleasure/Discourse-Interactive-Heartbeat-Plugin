en:
  site_settings:
    interactive_heartbeat_enabled: "Enable private Interactive Heartbeat sessions. Requires the Heartrate plugin and asynchronous current readings."
    interactive_heartbeat_nav_enabled: "Allow the theme component to show the Interactive Heartbeat navigation item."
    interactive_heartbeat_test_lab_enabled: "Enable the Interactive Heartbeat Test Lab for administrators only. Non-admin users cannot see or access it."
    interactive_heartbeat_allowed_groups: "Groups allowed to create and participate in Interactive Heartbeat sessions."
    interactive_heartbeat_lovense_developer_token: "Lovense developer token. Kept server-side and only used to request per-user authorization tokens."
    interactive_heartbeat_lovense_platform_name: "Website name configured in the Lovense developer dashboard."
    interactive_heartbeat_lovense_app_type: "Lovense app used for pairing: Lovense Remote or Lovense Connect."
    interactive_heartbeat_lovense_callback_ttl_seconds: "Seconds to retain the last verified Lovense callback status in temporary Redis storage."
    interactive_heartbeat_invite_expiry_minutes: "Minutes before an unanswered session invitation expires."
    interactive_heartbeat_allow_nobody_invitation_preference: "Allow members to choose a Nobody option that rejects all new Interactive Heartbeat invitations."
    interactive_heartbeat_max_open_sessions_per_user: "Maximum number of open Interactive Heartbeat sessions per member. This limit applies to both senders and recipients."
    interactive_heartbeat_declined_invite_cooldown_minutes: "Minutes before the same pair can create a new session after an invitation was declined. Set to 0 to disable the cooldown."
    interactive_heartbeat_invites_per_day: "Maximum number of new Interactive Heartbeat invitations a member may create per day. Set to 0 to disable this daily limit."
    interactive_heartbeat_max_invitation_list_members: "Maximum number of members in each user's approved and blocked invitation lists combined."
    interactive_heartbeat_completed_session_retention_days: "Days to retain ended, declined and expired Interactive Heartbeat sessions before automatic deletion. Set to 0 to retain them indefinitely."
    interactive_heartbeat_presence_timeout_seconds: "Seconds without participant presence before an active session is paused."
    interactive_heartbeat_signal_unstable_seconds: "Age in seconds after which a heartbeat reading is shown as delayed while the local rhythm continues."
    interactive_heartbeat_signal_stale_seconds: "Hard age limit in seconds after which heartbeat toy control stops and the session is paused."
    interactive_heartbeat_signal_poll_ms: "Client interval for refreshing the current heartbeat control signal."
    interactive_heartbeat_default_pulse_strength: "Default Lovense vibration strength for each heartbeat pulse (1-20)."
    interactive_heartbeat_default_pulse_duration_ms: "Default duration of each heartbeat vibration pulse in milliseconds."
